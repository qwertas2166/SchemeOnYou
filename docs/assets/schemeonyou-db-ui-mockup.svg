    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .ui { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; }
      .title { font-size: 30px; font-weight: 800; fill: #F8FAFC; }
      .sub { font-size: 15px; fill: #CBD5E1; }
      .label { font-size: 13px; fill: #64748B; font-weight: 700; letter-spacing: .04em; }
      .small { font-size: 13px; fill: #475569; }
      .tiny { font-size: 11px; fill: #64748B; }
      .panel-title { font-size: 14px; fill: #E2E8F0; font-weight: 700; }
      .panel-muted { font-size: 12px; fill: #94A3B8; }
      .table-title { font-size: 16px; font-weight: 800; fill:#0F172A; }
      .col { font-size: 13px; fill:#334155; }
      .key { font-size: 12px; fill:#0F172A; font-weight:700; }
      .chip { font-size: 12px; fill:#1E293B; font-weight:700; }
    </style>
  </defs>

